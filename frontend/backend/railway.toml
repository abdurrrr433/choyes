[build]
builder = "NIXPACKS"

[deploy]
startCommand = "bash start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# If Railway dashboard still shows RAILPACK / express-build after deploying:
# Go to Railway → Service → Settings → Build → Builder and manually set to NIXPACKS
# then trigger a manual redeploy.
