name: Deploy Supabase (functions + migrations)

on:
  push:
    branches: [main]
    paths:
      - "frontend/supabase/functions/**"
      - "frontend/supabase/migrations/**"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        working-directory: frontend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      # Applies any new migration files in frontend/supabase/migrations
      # against the live project database. Skipped if SUPABASE_DB_PASSWORD
      # is not set (functions still deploy either way).
      - name: Push database migrations
        if: ${{ secrets.SUPABASE_DB_PASSWORD != '' }}
        working-directory: frontend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy edge functions
        working-directory: frontend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in access-admin access-agency access-auth access-wallet svp-auth svp-proxy test-center-owner; do
            echo "── Deploying $fn ──"
            supabase functions deploy "$fn" --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
          done
